<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    

<p>Click The button to evalute javascript code</p>
<button onclick="myfunction()">Try it</button>
<p id="result"></p>

<script>

function myfunction() {

var x = 2;
var y = 3;
var a =  eval ("x + y") + "<br>";
var b = eval("5 * 5") + "<br>" ;
var c =  eval ("y - x")  + "<br>" ;


 var res = a+b+c;
 document.getElementById("result").innerHTML = res;
}


</script>





</body>
</html>
